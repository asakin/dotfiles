# ============================================================================
# §concierge tmux config — 2026-05-03
# ============================================================================

# ── Prefix: F13 ──────────────────────────────────────────────────────────────
# Dedicated key on K10 Max top row. No modifier, no conflicts.
unbind C-b
set -g prefix F13
bind F13 send-prefix

# ── Shell ────────────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh

# ── Terminal colors ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Mouse ────────────────────────────────────────────────────────────────────
set -g mouse on

# ── No delay on Escape ───────────────────────────────────────────────────────
set -sg escape-time 0

# ── Window/pane index from 1 ─────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Aggressive resize ────────────────────────────────────────────────────────
setw -g aggressive-resize on

# ── History ──────────────────────────────────────────────────────────────────
set -g history-limit 50000

# ── Splits: stay in current directory ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation: vim keys ────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ──────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded."

# ── Broadcast to all panes (swarm bootstrap) ─────────────────────────────────
# Prefix + B = toggle broadcast (type one command → all panes)
bind B setw synchronize-panes \; display "Broadcast: #{?synchronize-panes,ON,OFF}"

# ── Copy mode: vim keys ──────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi r send -X rectangle-toggle

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

# Colors: matrix green-on-black (internal/work aesthetic)
set -g status-style "bg=#0d1117,fg=#00ff41"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#00ff41,bold] § #S #[fg=#555555]│ "
set -g status-right "#[fg=#555555]│ #[fg=#00ff41]#{?synchronize-panes,📡 BROADCAST ,}#[fg=#888888]%H:%M #[fg=#555555]│ #[fg=#00ff41]#H "

# Window list
setw -g window-status-format         "#[fg=#555555] #I:#W "
setw -g window-status-current-format "#[fg=#00ff41,bold,bg=#1a2332] #I:#W #[bg=#0d1117]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#222222"
set -g pane-active-border-style "fg=#00ff41"

# ── Activity alerts ──────────────────────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off
